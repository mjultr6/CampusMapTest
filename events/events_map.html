<script>
  // Fix the navigation button to point to Parking
  document.addEventListener('DOMContentLoaded', () => {
    const navBtn = document.getElementById('navBtn');
    if (navBtn) {
      navBtn.href = "{{ '/parking/parking_map.html' | relative_url }}";
      navBtn.innerHTML = "🅿️ Parking Map";
    }
  });
</script>

<div id="calPopup">
    <div class="cal-nav">
        <button id="prevMonth">←</button>
        <span class="cal-month-label" id="calMonthLabel"></span>
        <button id="nextMonth">→</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
</div>

<div id="bottomSheet">
    <div class="sheet-handle"></div>
    <button class="sheet-close" id="sheetClose">✕</button>
    <div class="sheet-inner" id="sheetContent"></div>
</div>

<div id="noDateMsg">
    <div class="big">Select a date above</div>
    <div class="small">to see events on campus</div>
</div>

<script>
    const BUILDINGS_DATA = "{{ '/furman_buildings.geojson' | relative_url }}";
    const CLP_DATA = "{{ '/clp_all_events.json' | relative_url }}";
    const ATHLETICS_DATA = "{{ '/furman_home_map_data.json' | relative_url }}";
</script>

<script src="{{ '/assets/js/events-map-logic.js' | relative_url }}"></script>
