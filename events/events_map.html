---
layout: map-template
title: Furman Events Map
---

<div class="header-row2">
    <div class="divider"></div>
    <div id="dateWrapper">
        <label>Select Date</label>
        <button id="calBtn">
            <span class="cal-icon">📅</span>
            <span class="cal-text" id="calBtnText">— Choose a date —</span>
            <span class="cal-arrow">▼</span>
        </button>
    </div>
    <div id="layerToggles">
        <button class="layer-toggle on" data-layer="clp"><span class="toggle-dot"></span>CLP</button>
        <button class="layer-toggle on" data-layer="athletics"><span class="toggle-dot"></span>Athletics</button>
    </div>
    <div id="eventCount"></div>
</div>

<div id="calPopup">
    <div class="cal-nav">
        <button id="prevMonth">←</button>
        <span class="cal-month-label" id="calMonthLabel"></span>
        <button id="nextMonth">→</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
</div>

<div id="bottomSheet">
    <div class="sheet-handle"></div>
    <button class="sheet-close" id="sheetClose">✕</button>
    <div class="sheet-inner" id="sheetContent"></div>
</div>

<div id="noDateMsg">
    <div class="big">Select a date above</div>
    <div class="small">to see events on campus</div>
</div>

<script>
    const BUILDINGS_DATA = "{{ '/furman_buildings.geojson' | relative_url }}";
    const CLP_DATA = "{{ '/clp_all_events.json' | relative_url }}";
    const ATHLETICS_DATA = "{{ '/furman_home_map_data.json' | relative_url }}";
</script>

<script src="{{ '/assets/js/events-logic.js' | relative_url }}"></script>
