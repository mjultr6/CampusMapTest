<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Furman Events Map</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.js"></script>
<style>
:root {
--purple-dark: #3B1F5E;
--purple: #9B6FD4;
--text-light: #F0ECF8;
--bg-dark: #2C2C2E;
--bg-mid: #3A3A3C;
--purple-light: #C9A8F0;
--grey: #9A96A8;
--purple-bright: #7C3AED;
--gold: #C9991A;
--gold-light: #F0C84A;
--gold-dim: rgba(201,153,26,0.35);
--gold-border: rgba(201,153,26,0.4);
--header-height: 68px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
width: 100%; height: 100%;
font-family: 'DM Sans', sans-serif;
background: var(--bg-dark);
color: var(--text-light);
overflow: hidden;
}
#header {
position: absolute; top: 0; left: 0; right: 0; z-index: 1000;
background: linear-gradient(180deg, rgba(44,44,46,0.97) 0%, rgba(44,44,46,0.90) 100%);
backdrop-filter: blur(8px);
border-bottom: 1px solid rgba(130,90,200,0.25);
padding: 10px 16px;
display: flex; flex-direction: column; gap: 8px;
}
@media (min-width: 600px) {
#header { flex-direction: row; align-items: center; gap: 16px; padding: 14px 24px; }
}
.header-row1 { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
@media (min-width: 600px) { .header-row1 { flex-shrink: 0; } }
#header h1 {
font-family: 'Playfair Display', serif;
font-size: 1.1rem; font-weight: 700;
color: var(--purple-light); letter-spacing: 0.03em; white-space: nowrap;
}
@media (min-width: 600px) { #header h1 { font-size: 1.25rem; } }
#header h1 span {
color: var(--grey); font-weight: 400; font-size: 0.75rem;
display: block; letter-spacing: 0.08em; text-transform: uppercase;
}
.divider { display: none; }
@media (min-width: 600px) {
.divider { display: block; width: 1px; height: 36px; background: rgba(130,90,200,0.3); flex-shrink: 0; }
}
.header-row2 { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
#dateWrapper { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
#dateWrapper label {
font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.12em;
color: var(--grey); white-space: nowrap; display: none;
}
@media (min-width: 600px) { #dateWrapper label { display: block; } }
#calBtn {
display: flex; align-items: center; gap: 8px;
background: rgba(130,90,200,0.08); border: 1px solid rgba(130,90,200,0.35);
color: var(--text-light); font-family: 'DM Sans', sans-serif;
font-size: 0.88rem; padding: 7px 12px; border-radius: 4px;
cursor: pointer; flex: 1; min-width: 0;
transition: border-color 0.2s, background 0.2s; text-align: left;
}
@media (min-width: 600px) { #calBtn { min-width: 200px; flex: none; font-size: 0.9rem; padding: 7px 14px; } }
#calBtn:hover { border-color: var(--purple); background: rgba(130,90,200,0.14); }
#calBtn .cal-icon { font-size: 1rem; flex-shrink: 0; }
#calBtn .cal-text { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#calBtn .cal-arrow { font-size: 0.65rem; color: var(--purple); margin-left: 4px; flex-shrink: 0; }
/* ── Layer toggles ── */
#layerToggles { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.layer-toggle {
display: flex; align-items: center; gap: 6px;
padding: 5px 10px; border-radius: 5px; border: 1px solid transparent;
font-family: 'DM Sans', sans-serif; font-size: 0.75rem;
font-weight: 500; cursor: pointer; white-space: nowrap;
transition: background 0.18s, border-color 0.18s, color 0.18s;
background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1);
color: var(--grey); touch-action: manipulation; user-select: none;
}
@media (min-width: 600px) { .layer-toggle { padding: 5px 12px; font-size: 0.78rem; } }
.layer-toggle .toggle-dot {
width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
border: 1.5px solid currentColor; transition: background 0.18s, border-color 0.18s;
background: transparent;
}
.layer-toggle[data-layer="clp"].on { background: rgba(155,111,212,0.16); border-color: rgba(155,111,212,0.45); color: var(--purple-light); }
.layer-toggle[data-layer="clp"].on .toggle-dot { background: var(--purple); border-color: var(--purple); }
.layer-toggle[data-layer="athletics"].on { background: rgba(201,153,26,0.14); border-color: rgba(201,153,26,0.45); color: var(--gold-light); }
.layer-toggle[data-layer="athletics"].on .toggle-dot { background: var(--gold); border-color: var(--gold); }
/* ── Calendar popup ── */
#calPopup {
display: none; position: absolute;
top: calc(var(--header-height) + 4px); left: 8px; right: 8px; z-index: 2000;
background: rgba(44,44,46,0.98); border: 1px solid rgba(130,90,200,0.4);
border-radius: 10px; padding: 14px;
box-shadow: 0 12px 40px rgba(0,0,0,0.7); backdrop-filter: blur(10px);
}
@media (min-width: 600px) {
#calPopup { left: 50%; right: auto; transform: translateX(-50%); min-width: 300px; top: 68px; }
}
#calPopup.open { display: block; animation: fadeDown 0.18s ease; }
@keyframes fadeDown {
from { opacity: 0; transform: translateY(-8px); }
to { opacity: 1; transform: translateY(0); }
}
@media (min-width: 600px) {
@keyframes fadeDown {
from { opacity: 0; transform: translateX(-50%) translateY(-8px); }
to { opacity: 1; transform: translateX(-50%) translateY(0); }
}
}
.cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.cal-nav button {
background: none; border: 1px solid rgba(130,90,200,0.3); color: var(--purple);
border-radius: 4px; width: 32px; height: 32px; cursor: pointer; font-size: 0.9rem;
display: flex; align-items: center; justify-content: center;
transition: background 0.15s; touch-action: manipulation;
}
.cal-nav button:hover { background: rgba(130,90,200,0.15); }
.cal-month-label { font-family: 'Playfair Display', serif; font-size: 0.95rem; color: var(--purple-light); font-weight: 600; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
.cal-dow { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--grey); text-align: center; padding-bottom: 6px; }
.cal-day {
text-align: center; padding: 8px 2px; border-radius: 4px;
font-size: 0.82rem; cursor: default; color: rgba(154,136,112,0.4);
transition: background 0.15s; position: relative; touch-action: manipulation;
}
@media (min-width: 600px) { .cal-day { padding: 6px 2px; } }
.cal-day.has-clp::after {
content: ''; display: block; width: 4px; height: 4px;
background: var(--purple); border-radius: 50%; margin: 2px auto 0;
}
.cal-day.has-athletics::after {
content: ''; display: block; width: 4px; height: 4px;
background: var(--gold); border-radius: 50%; margin: 2px auto 0;
}
.cal-day.has-clp.has-athletics::after {
content: ''; display: block; width: 10px; height: 4px;
background: linear-gradient(90deg, var(--purple) 50%, var(--gold) 50%);
border-radius: 2px; margin: 2px auto 0;
}
.cal-day.has-clp, .cal-day.has-athletics { color: var(--text-light); cursor: pointer; font-weight: 500; }
.cal-day.has-clp:hover, .cal-day.has-athletics:hover { background: rgba(130,90,200,0.2); color: var(--purple-light); }
.cal-day.selected { background: var(--purple) !important; color: var(--bg-dark) !important; font-weight: 700; }
.cal-day.selected::after { background: var(--bg-dark) !important; }
.cal-day.empty { cursor: default; }
/* ── Event count ── */
#eventCount {
font-size: 0.72rem; color: var(--grey); white-space: nowrap; flex-shrink: 0;
background: rgba(130,90,200,0.08); border: 1px solid rgba(130,90,200,0.2);
border-radius: 4px; padding: 5px 8px; line-height: 1.3;
}
@media (min-width: 600px) { #eventCount { background: none; border: none; padding: 0; font-size: 0.75rem; } }
#eventCount strong { color: var(--purple); font-size: 0.9rem; }
#eventCount .gold { color: var(--gold); }
#eventCount:empty { display: none; }
/* ── Nav button ── */
#navBtn {
padding: 6px 10px; background: rgba(130,90,200,0.12); border: 1px solid rgba(130,90,200,0.35);
border-radius: 4px; color: var(--purple-light); font-family: 'DM Sans', sans-serif;
font-size: 0.78rem; text-decoration: none; white-space: nowrap;
transition: background 0.2s, border-color 0.2s; flex-shrink: 0; touch-action: manipulation;
}
@media (min-width: 600px) { #navBtn { margin-left: auto; padding: 7px 14px; font-size: 0.82rem; } }
#navBtn:hover { background: rgba(130,90,200,0.25); border-color: var(--purple); color: white; }
/* ── Map ── */
.leaflet-top.leaflet-left { top: calc(var(--header-height) + 10px); }
#map { position: absolute; top: var(--header-height); bottom: 0; left: 0; right: 0; }
/* ── Popups ── */
.leaflet-popup-content-wrapper {
background: rgba(44,44,46,0.97) !important; border: 1px solid rgba(130,90,200,0.4) !important;
border-radius: 8px !important; box-shadow: 0 8px 32px rgba(0,0,0,0.4) !important;
color: var(--text-light) !important; font-family: 'DM Sans', sans-serif !important;
max-width: 300px !important; padding: 0 !important;
}
@media (min-width: 600px) { .leaflet-popup-content-wrapper { max-width: 340px !important; } }
.leaflet-popup-content { margin: 0 !important; width: auto !important; }
.leaflet-popup-tip { background: rgba(44,44,46,0.97) !important; }
.leaflet-popup-close-button { color: var(--grey) !important; font-size: 18px !important; padding: 8px 10px !important; top: 4px !important; right: 4px !important; }
.leaflet-popup-close-button:hover { color: var(--purple) !important; }
.popup-inner { padding: 14px 16px; }
.popup-building {
font-family: 'Playfair Display', serif; font-size: 1rem; color: var(--purple-light);
margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid rgba(130,90,200,0.2); padding-right: 20px;
}
.popup-section-label {
font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.12em;
font-weight: 600; margin: 8px 0 4px; padding: 3px 6px; border-radius: 3px; display: inline-block;
}
.popup-section-label.clp { color: var(--purple-light); background: rgba(155,111,212,0.12); }
.popup-section-label.athletics { color: var(--gold-light); background: rgba(201,153,26,0.12); }
.popup-event { padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
.popup-event:last-child { border-bottom: none; padding-bottom: 0; }
.popup-event-title { font-size: 0.86rem; font-weight: 500; color: var(--text-light); line-height: 1.35; margin-bottom: 3px; }
.popup-event-meta { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.popup-time { font-size: 0.75rem; font-weight: 500; }
.popup-time.clp { color: var(--purple); }
.popup-time.gold { color: var(--gold); }
.popup-room { font-size: 0.72rem; color: var(--grey); font-style: italic; }
.popup-no-events { font-size: 0.82rem; color: var(--grey); font-style: italic; padding: 4px 0; }
/* ── Legend ── */
#legend {
position: absolute; bottom: 24px; right: 12px; z-index: 1000;
background: rgba(44,44,46,0.94); border: 1px solid rgba(130,90,200,0.25);
border-radius: 6px; padding: 8px 12px; font-size: 0.68rem; color: var(--grey); backdrop-filter: blur(6px);
}
@media (min-width: 600px) { #legend { font-size: 0.72rem; padding: 10px 14px; } }
#legend div { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
#legend div:last-child { margin-bottom: 0; }
.legend-swatch { width: 12px; height: 12px; border-radius: 2px; flex-shrink: 0; }
@media (min-width: 600px) { .legend-swatch { width: 14px; height: 14px; } }
/* ── No date message ── */
#noDateMsg {
position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
z-index: 999; text-align: center; pointer-events: none; padding: 0 20px;
}
#noDateMsg .big { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: rgba(237,217,138,0.35); margin-bottom: 6px; }
@media (min-width: 600px) { #noDateMsg .big { font-size: 1.4rem; } }
#noDateMsg .small { font-size: 0.78rem; color: rgba(154,136,112,0.5); text-transform: uppercase; letter-spacing: 0.1em; }
/* ── Bottom sheet ── */
#bottomSheet {
display: none; position: absolute; bottom: 0; left: 0; right: 0; z-index: 1100;
background: rgba(44,44,46,0.98); border-top: 1px solid rgba(130,90,200,0.4);
border-radius: 14px 14px 0 0; padding: 0 0 env(safe-area-inset-bottom, 0);
max-height: 55vh; overflow-y: auto; box-shadow: 0 -8px 32px rgba(0,0,0,0.5);
transform: translateY(100%); transition: transform 0.28s cubic-bezier(0.32, 0.72, 0, 1);
}
#bottomSheet.open { display: block; transform: translateY(0); }
.sheet-handle { width: 36px; height: 4px; background: rgba(130,90,200,0.35); border-radius: 2px; margin: 10px auto 6px; }
.sheet-close { position: absolute; top: 8px; right: 14px; background: none; border: none; color: var(--grey); font-size: 1.1rem; cursor: pointer; padding: 4px; touch-action: manipulation; }
.sheet-close:hover { color: var(--purple); }
.sheet-inner { padding: 4px 16px 20px; }
@media (min-width: 600px) { #bottomSheet { display: none !important; } }
</style>
</head>
<body>

<div id="header">
<div class="header-row1">
<h1><span>Furman University</span>Campus Events Map</h1>
<a href="../parking/parking_map.html" id="navBtn">🅿️ Parking</a>
</div>
<div class="header-row2">
<div class="divider"></div>
<div id="dateWrapper">
<label>Select Date</label>
<button id="calBtn">
<span class="cal-icon">&#128197;</span>
<span class="cal-text" id="calBtnText">&#8212; Choose a date &#8212;</span>
<span class="cal-arrow">&#9660;</span>
</button>
</div>
<div id="layerToggles">
<button class="layer-toggle on" data-layer="clp"><span class="toggle-dot"></span>CLP</button>
<button class="layer-toggle on" data-layer="athletics"><span class="toggle-dot"></span>Athletics</button>
</div>
<div id="eventCount"></div>
</div>
</div>

<div id="calPopup">
<div class="cal-nav">
<button id="prevMonth">&#8592;</button>
<span class="cal-month-label" id="calMonthLabel"></span>
<button id="nextMonth">&#8594;</button>
</div>
<div class="cal-grid" id="calGrid"></div>
</div>

<div id="map"></div>

<div id="bottomSheet">
<div class="sheet-handle"></div>
<button class="sheet-close" id="sheetClose">&#10005;</button>
<div class="sheet-inner" id="sheetContent"></div>
</div>

<div id="noDateMsg">
<div class="big">Select a date above</div>
<div class="small">to see events on campus</div>
</div>

<div id="legend">
<div><span class="legend-swatch" style="background:#9B6FD4;"></span> CLP event</div>
<div><span class="legend-swatch" style="background:#C9991A;"></span> Athletics event</div>
<div><span class="legend-swatch" style="background:linear-gradient(135deg,#9B6FD4 50%,#C9991A 50%);"></span> Both active</div>
<div><span class="legend-swatch" style="background:rgba(80,50,130,0.2);border:1px solid rgba(130,90,200,0.2)"></span> No events</div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let clpEvents = [];
let athleticsEvents = [];
let clpByDate = {};
let athleticsByDate = {};
let clpDatesSet = new Set();
let athleticsDatesSet = new Set();
let cachedLayer = null;
let featureLayerMap = {};
let calViewDate = new Date();
let selectedDate = '';
let showCLPLayer = true;
let showAthleticsLayer = true;

// ── Constants ─────────────────────────────────────────────────────────────────
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS = ['Su','Mo','Tu','We','Th','Fr','Sa'];

const styleBase = { color: 'rgba(130,90,200,0.25)', weight: 1, fillColor: 'rgba(80,50,130,0.15)', fillOpacity: 1 };
const styleCLP = { color: '#9B6FD4', weight: 2.5, fillColor: '#9B6FD4', fillOpacity: 0.35 };
const styleAthletics = { color: '#C9991A', weight: 2.5, fillColor: '#C9991A', fillOpacity: 0.35 };
const styleBoth = { color: '#C9A8F0', weight: 2.5, fillColor: '#9B6FD4', fillOpacity: 0.30 };
const styleHoverCLP = { color: '#C9A8F0', weight: 3, fillColor: '#9B6FD4', fillOpacity: 0.6 };
const styleHoverAth = { color: '#F0C84A', weight: 3, fillColor: '#C9991A', fillOpacity: 0.6 };
const styleHoverBoth = { color: '#F0C84A', weight: 3, fillColor: '#9B6FD4', fillOpacity: 0.5 };

// ── Helpers ───────────────────────────────────────────────────────────────────
function isMobile() { return window.innerWidth < 600; }

function updateHeaderHeight() {
  const h = document.getElementById('header').offsetHeight;
  document.documentElement.style.setProperty('--header-height', h + 'px');
  if (map) map.invalidateSize();
}

function getActiveStyle(hasCLP, hasAth) {
  if (hasCLP && hasAth) return styleBoth;
  if (hasCLP) return styleCLP;
  if (hasAth) return styleAthletics;
  return styleBase;
}

function getHoverStyle(hasCLP, hasAth) {
  if (hasCLP && hasAth) return styleHoverBoth;
  if (hasCLP) return styleHoverCLP;
  if (hasAth) return styleHoverAth;
  return styleBase;
}

// ── Room → building (CLP) ─────────────────────────────────────────────────────
const ROOM_TO_BUILDING = {
  "Amphitheater": "Amphitheater",
  "Amphitheater, Furman Lake Amphitheater Parking Lot": "Amphitheater",
  "Furman Lake Amphitheater Parking Lot": "Amphitheater",
  "Chapel Main Sanctuary": "Daniel Chapel",
  "Chapel Bryan Garden Room": "Daniel Chapel",
  "Chapel Bryan Garden Room,Chapel Bryan Garden Room": "Daniel Chapel",
  "Daniel Recital Hall": "Daniel Music Building",
  "Furman Hall 214 - McEachern Lecture Hall": "Furman Hall",
  "Johns Hall 101": "Johns Hall",
  "Johns Hall 109": "Johns Hall",
  "McAlister Auditorium": "McAlister Auditorium",
  "Patrick Lecture Hall": "Plyler Hall",
  "Roe Art Building Gallery": "Roe Art Building",
  "Roe Art Building Littlejohn Lecture Room": "Roe Art Building",
  "Playhouse": "Playhouse",
  "Trone Student Center Burgiss Theater": "Trone Student Center",
  "Trone Student Center Watkins Room": "Trone Student Center",
  "Trone Student Center Watkins Room Center Section": "Trone Student Center",
  "Trone Student Center Watkins Room Lobby": "Trone Student Center",
  "Trone Student Center Point of View Fire Pit": "Trone Student Center",
  "Younts Conference Center Great Hall": "Younts Conference Center",
  "Younts Conference Center Shaw Hall": "Younts Conference Center",
  "Younts Conference Center Birmingham Room 110A": "Younts Conference Center",
  "Younts Conference Center Atlanta Room 120B": "Younts Conference Center",
  "Younts Conference Center Atlanta Room 120A": "Younts Conference Center",
  "Younts Conference Center Birmingham Room": "Younts Conference Center",
  "Hartness Pavilion": "Hartness and Trustees",
  "Trustees Dining Room": "Hartness and Trustees",
};

function getBuildingForCLPLocation(loc) {
  if (!loc) return null;
  const clean = loc.replace(/….*$/, '').trim();
  if (ROOM_TO_BUILDING[clean]) return ROOM_TO_BUILDING[clean];
  const parts = clean.split(',').map(s => s.trim());
  for (const part of parts) {
    if (ROOM_TO_BUILDING[part]) return ROOM_TO_BUILDING[part];
  }
  const lower = clean.toLowerCase();
  for (const [key, bid] of Object.entries(ROOM_TO_BUILDING)) {
    if (lower.includes(key.toLowerCase()) || key.toLowerCase().includes(lower)) return bid;
  }
  return null;
}

function getBuildingForFacility(facility) {
  if (!facility) return null;
  const f = facility.trim();
  if (f === 'Furman Campus') return null;
  if (f === 'Alley Gymnasium') return 'Timmons Arena';
  return f;
}

function normalizeAthleticsDate(dateStr) {
  if (!dateStr) return '';
  let s = dateStr.trim();
  s = s.replace(/^(Monday|Tuesday|Wednesday|Thursday|Friday|Saturday|Sunday),\s*/i, '');
  s = s.replace(/(\d+)(st|nd|rd|th),/i, '$1,');
  return s.trim();
}

// ── Popup HTML ────────────────────────────────────────────────────────────────
function buildPopupHTML(name, clpEvs, athEvs, showCLP, showAthletics) {
  let html = '<div class="popup-inner">';
  html += '<div class="popup-building">&#128205; ' + name + '</div>';
  const hasCLP = showCLP && clpEvs && clpEvs.length;
  const hasAth = showAthletics && athEvs && athEvs.length;
  if (!hasCLP && !hasAth) {
    html += '<div class="popup-no-events">No events on this date.</div>';
  } else {
    if (hasCLP) {
      if (showCLP && showAthletics) html += '<div class="popup-section-label clp">&#127891; CLP</div>';
      clpEvs.forEach(ev => {
        html += '<div class="popup-event">';
        html += '<div class="popup-event-title">' + ev.title + '</div>';
        html += '<div class="popup-event-meta">';
        if (ev.time) html += '<span class="popup-time clp">&#9200; ' + ev.time + '</span>';
        if (ev.location) html += '<span class="popup-room">' + ev.location + '</span>';
        html += '</div>';
        if (ev.detail_url) html += '<a href="' + ev.detail_url + '" target="_blank" style="font-size:0.72rem;color:#9B6FD4;text-decoration:none;margin-top:3px;display:inline-block;">View details &rarr;</a>';
        html += '</div>';
      });
    }
    if (hasAth) {
      if (showCLP && showAthletics) html += '<div class="popup-section-label athletics">&#127936; Athletics</div>';
      athEvs.forEach(ev => {
        html += '<div class="popup-event">';
        html += '<div class="popup-event-title">' + ev.sport + ' vs ' + ev.opponent + '</div>';
        html += '<div class="popup-event-meta">';
        if (ev.time) html += '<span class="popup-time gold">&#9200; ' + ev.time + '</span>';
        html += '</div>';
        html += '</div>';
      });
    }
  }
  html += '</div>';
  return html;
}

// ── Map & Data Loading ────────────────────────────────────────────────────────
let map;

async function loadData() {
  const [geoRes, clpRes, athRes] = await Promise.all([
    fetch('furman_buildings.geojson').then(r => r.json()).catch(() => ({ type:'FeatureCollection', features:[] })),
    fetch('clp_all_events.json').then(r => r.json()).catch(() => []),
    fetch('furman_home_map_data.json').then(r => r.json()).catch(() => [])
  ]);

  clpEvents = clpRes || [];
  clpByDate = {};
  clpEvents.forEach(ev => {
    const d = ev.date ? ev.date.trim() : '';
    if (d) (clpByDate[d] ||= []).push(ev);
  });
  clpDatesSet = new Set(Object.keys(clpByDate));

  athleticsEvents = athRes || [];
  athleticsByDate = {};
  athleticsEvents.forEach(ev => {
    const d = normalizeAthleticsDate(ev.date);
    if (d) (athleticsByDate[d] ||= []).push(ev);
  });
  athleticsDatesSet = new Set(Object.keys(athleticsByDate));

  // Create map
  map = L.map('map', {
    center: [34.9260, -82.4375],
    zoom: isMobile() ? 15 : 16,
    zoomControl: false,
    maxBounds: [[34.91, -82.46], [34.94, -82.42]]
  });
  L.control.zoom({ position: 'topleft' }).addTo(map);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO',
    subdomains: 'abcd',
    minZoom: 14,
    maxZoom: 19
  }).addTo(map);

  // Build cached layer
  cachedLayer = L.geoJSON(geoRes, {
    style: styleBase,
    filter: f => ['Polygon','MultiPolygon','LineString'].includes(f.geometry.type),
    onEachFeature: (f, layer) => {
      const fid = f.id ? String(f.id) : '';
      const propName = (f.properties && f.properties.name) ? f.properties.name.trim() : '';
      const entry = { layer, feature: f };
      if (fid) featureLayerMap[fid] = entry;
      if (propName) featureLayerMap[propName] = entry;
      layer._hasCLP = false;
      layer._hasAthletics = false;
      layer.on('mouseover', function() {
        if (this._hasCLP || this._hasAthletics) this.setStyle(getHoverStyle(this._hasCLP, this._hasAthletics));
      });
      layer.on('mouseout', function() {
        if (this._hasCLP || this._hasAthletics) this.setStyle(getActiveStyle(this._hasCLP, this._hasAthletics));
      });
    }
  }).addTo(map);

  // ── NOW attach all listeners (after data & map are ready) ─────────────────
  document.querySelectorAll('.layer-toggle').forEach(btn => {
    btn.addEventListener('click', function() {
      const layer = this.dataset.layer;
      if (layer === 'clp') {
        showCLPLayer = !showCLPLayer;
        this.classList.toggle('on', showCLPLayer);
      } else if (layer === 'athletics') {
        showAthleticsLayer = !showAthleticsLayer;
        this.classList.toggle('on', showAthleticsLayer);
      }
      if (selectedDate) updateLayerForDate(selectedDate);
      renderCalendar();
    });
  });

  // Calendar listeners
  document.getElementById('calBtn').addEventListener('click', function(e) {
    e.stopPropagation();
    const popup = document.getElementById('calPopup');
    popup.classList.toggle('open');
    if (popup.classList.contains('open')) renderCalendar();
  });

  document.getElementById('prevMonth').addEventListener('click', e => {
    e.stopPropagation();
    calViewDate = new Date(calViewDate.getFullYear(), calViewDate.getMonth() - 1, 1);
    renderCalendar();
  });

  document.getElementById('nextMonth').addEventListener('click', e => {
    e.stopPropagation();
    calViewDate = new Date(calViewDate.getFullYear(), calViewDate.getMonth() + 1, 1);
    renderCalendar();
  });

  document.addEventListener('click', e => {
    const popup = document.getElementById('calPopup');
    const btn = document.getElementById('calBtn');
    if (popup.classList.contains('open') && !popup.contains(e.target) && !btn.contains(e.target))
      popup.classList.remove('open');
  });

  // Bottom sheet
  document.getElementById('sheetClose').addEventListener('click', () => {
    document.getElementById('bottomSheet').classList.remove('open');
  });

  // Resize
  window.addEventListener('resize', () => {
    updateHeaderHeight();
    if (selectedDate) updateLayerForDate(selectedDate);
  });

  updateHeaderHeight();

  // Auto-select today / next event
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const todayStr = MONTHS[today.getMonth()] + ' ' + today.getDate() + ', ' + today.getFullYear();
  let targetDate = todayStr;
  if (!clpDatesSet.has(targetDate) && !athleticsDatesSet.has(targetDate)) {
    const allDates = [...new Set([...clpDatesSet, ...athleticsDatesSet])];
    allDates.sort((a, b) => new Date(a) - new Date(b));
    const next = allDates.find(d => new Date(d) >= today);
    if (next) targetDate = next;
  }
  calViewDate = new Date(targetDate);
  renderCalendar();
  if (clpDatesSet.has(targetDate) || athleticsDatesSet.has(targetDate)) {
    selectDate(targetDate);
  } else {
    updateLayerForDate('');
  }
}

// ── Update map ────────────────────────────────────────────────────────────────
function updateLayerForDate(date) {
  const noMsg = document.getElementById('noDateMsg');
  if (!date) {
    noMsg.style.display = 'block';
    document.getElementById('eventCount').innerHTML = '';
    const visited = new Set();
    Object.values(featureLayerMap).forEach(({ layer }) => {
      if (visited.has(layer)) return;
      visited.add(layer);
      layer._hasCLP = false; layer._hasAthletics = false;
      layer.setStyle(styleBase); layer.unbindPopup(); layer.off('click');
    });
    return;
  }
  noMsg.style.display = 'none';

  const dayCLP = showCLPLayer ? (clpByDate[date] || []) : [];
  const dayAth = showAthleticsLayer ? (athleticsByDate[date] || []) : [];

  const clpBuilding = {};
  dayCLP.forEach(ev => {
    const bid = getBuildingForCLPLocation(ev.location);
    if (bid) (clpBuilding[bid] ||= []).push(ev);
  });

  const athBuilding = {};
  dayAth.forEach(ev => {
    const bid = getBuildingForFacility(ev.facility);
    if (bid) (athBuilding[bid] ||= []).push(ev);
  });

  // Event count
  const parts = [];
  if (showCLPLayer) parts.push('<strong>' + dayCLP.length + '</strong> CLP event' + (dayCLP.length !== 1 ? 's' : ''));
  if (showAthleticsLayer) parts.push('<strong class="gold">' + dayAth.length + '</strong> game' + (dayAth.length !== 1 ? 's' : ''));
  document.getElementById('eventCount').innerHTML = parts.join(' &bull; ');

  const visited = new Set();
  Object.values(featureLayerMap).forEach(({ layer, feature }) => {
    if (visited.has(layer)) return;
    visited.add(layer);

    const propName = (feature.properties && feature.properties.name) ? feature.properties.name.trim() : '';
    const fid = feature.id ? String(feature.id) : '';

    const clpEvs = clpBuilding[propName] || clpBuilding[fid] || [];
    const athEvs = athBuilding[propName] || athBuilding[fid] || [];

    const hasCLP = clpEvs.length > 0;
    const hasAth = athEvs.length > 0;

    layer._hasCLP = hasCLP;
    layer._hasAthletics = hasAth;
    layer.setStyle(getActiveStyle(hasCLP, hasAth));

    const displayName = propName || fid;
    const html = buildPopupHTML(displayName, clpEvs, athEvs, showCLPLayer, showAthleticsLayer);
    layer.off('click');

    if (isMobile()) {
      layer.unbindPopup();
      if (hasCLP || hasAth) layer.on('click', () => openBottomSheet(html));
    } else {
      if (hasCLP || hasAth) layer.bindPopup(html, { maxWidth: 340 });
      else layer.unbindPopup();
    }
  });
}

// ── Calendar ──────────────────────────────────────────────────────────────────
function renderCalendar() {
  const grid = document.getElementById('calGrid');
  const label = document.getElementById('calMonthLabel');
  const y = calViewDate.getFullYear();
  const m = calViewDate.getMonth();
  label.textContent = MONTHS[m] + ' ' + y;
  grid.innerHTML = '';
  DAYS.forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-dow'; el.textContent = d; grid.appendChild(el);
  });
  const firstDay = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  for (let i = 0; i < firstDay; i++) {
    const el = document.createElement('div'); el.className = 'cal-day empty'; grid.appendChild(el);
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = MONTHS[m] + ' ' + d + ', ' + y;
    const el = document.createElement('div');
    el.className = 'cal-day';
    el.textContent = d;
    const hasCLP = showCLPLayer && clpDatesSet.has(dateStr);
    const hasAth = showAthleticsLayer && athleticsDatesSet.has(dateStr);
    if (hasCLP) el.classList.add('has-clp');
    if (hasAth) el.classList.add('has-athletics');
    if (hasCLP || hasAth) {
      el.addEventListener('click', e => { e.stopPropagation(); selectDate(dateStr); });
    }
    if (dateStr === selectedDate) el.classList.add('selected');
    grid.appendChild(el);
  }
}

function selectDate(dateStr) {
  selectedDate = dateStr;
  document.getElementById('calBtnText').textContent = dateStr;
  document.getElementById('calPopup').classList.remove('open');
  renderCalendar();
  updateLayerForDate(dateStr);
}

// ── Bottom sheet ──────────────────────────────────────────────────────────────
function openBottomSheet(html) {
  document.getElementById('sheetContent').innerHTML = html;
  document.getElementById('bottomSheet').classList.add('open');
}

// Start everything
loadData();
</script>
